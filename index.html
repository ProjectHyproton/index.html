<script>
    function updateTimer() {
        // 设置初始时间：2026年3月29日 23:00:00 (北京时间)
        // JS 的 Date 对象中，月份是从 0 开始计数的，所以 3 月对应数字 2
        const startTime = new Date(2026, 2, 29, 23, 0, 0).getTime();
        
        setInterval(function() {
            const now = new Date().getTime();
            const diff = now - startTime;

            // 如果当前时间还没到初始时间，显示 0
            const displayDiff = diff > 0 ? diff : 0;

            const days = Math.floor(displayDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((displayDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((displayDiff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((displayDiff % (1000 * 60)) / 1000);

            const timerElement = document.getElementById("timer-display");
            if (timerElement) {
                timerElement.innerHTML = 
                    `<span class="timer-unit">${days}</span> 天 ` +
                    `<span class="timer-unit">${hours}</span> 小时 ` +
                    `<span class="timer-unit">${mins}</span> 分 ` +
                    `<span class="timer-unit">${secs}</span> 秒`;
            }
        }, 1000);
    }
    // 启动计时器
    updateTimer();
</script>
